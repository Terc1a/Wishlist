<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать вишлист</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-xl mx-auto mt-10 bg-white shadow rounded p-8">
    <h1 class="text-2xl font-bold mb-6">Создать новый вишлист</h1>
    <div id="wishlist-create-block">
        <!-- Форма создания вишлиста -->
        <form id="wishlist-form">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="name">Название</label>
                <input class="w-full border rounded px-3 py-2" type="text" id="name" name="name" required>
            </div>
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="description">Описание</label>
                <textarea class="w-full border rounded px-3 py-2" id="description" name="description"></textarea>
            </div>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                Создать
            </button>
        </form>
    </div>
    <div id="wishlist-items-block" style="display:none;">
        <div class="mb-6">
            <div class="text-lg font-semibold mb-2">Вишлист "<span id="wishlist-name"></span>" создан!</div>
            <div class="text-gray-600 mb-4" id="wishlist-desc"></div>
        </div>
        <div id="items-container">
            <!-- Форма элемента будет добавляться через JS -->
        </div>
        <button id="add-item-btn" type="button"
                class="mt-4 bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300 transition w-full">
            Добавить элемент
        </button>
        <div class="mt-8">
            <h2 class="text-lg font-semibold mb-2">Элементы вишлиста</h2>
            <ul class="space-y-2" id="wishlist-items-list">
                <!-- Список элементов (можно заполнить через JS или сервер) -->
            </ul>
        </div>
    </div>
    <div class="mt-8">
        <a href="{% url 'index' %}" class="text-blue-600 hover:underline">← Вернуться к списку вишлистов</a>
    </div>
</div>
<script>
    // CSRF для fetch
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    // Обработка создания вишлиста
    const wishlistForm = document.getElementById('wishlist-form');
    const wishlistCreateBlock = document.getElementById('wishlist-create-block');
    const wishlistItemsBlock = document.getElementById('wishlist-items-block');
    const wishlistNameSpan = document.getElementById('wishlist-name');
    const wishlistDescDiv = document.getElementById('wishlist-desc');
    let wishlistId = null;

    if (wishlistForm) {
        wishlistForm.addEventListener('submit', function (e) {
            e.preventDefault();
            fetch("{% url 'create_wishlist' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: JSON.stringify({
                    name: wishlistForm.name.value,
                    description: wishlistForm.description.value
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        wishlistId = data.id;
                        wishlistCreateBlock.style.display = 'none';
                        wishlistItemsBlock.style.display = '';
                        wishlistNameSpan.textContent = data.name;
                        wishlistDescDiv.textContent = data.description;
                        showFirstItemForm();
                    } else {
                        alert(data.error || "Ошибка создания вишлиста");
                    }
                })
                .catch(() => alert("Ошибка соединения с сервером"));
        });
    }

    // Динамическое добавление и отправка элементов
    let itemCount = 1;
    const addBtn = document.getElementById('add-item-btn');
    const itemsContainer = document.getElementById('items-container');
    const itemsList = document.getElementById('wishlist-items-list');

    function createItemForm(idx) {
        const div = document.createElement('div');
        div.className = 'item-form mb-4 border border-gray-300 rounded p-4 bg-gray-50';
        div.innerHTML = `
            <div class="mb-2">
                <label class="block mb-1 font-semibold" for="item_name_${idx}">Название</label>
                <input class="w-full border rounded px-3 py-2" type="text" id="item_name_${idx}" name="item_name" required>
            </div>
            <div class="mb-2">
                <label class="block mb-1 font-semibold" for="item_desc_${idx}">Описание</label>
                <textarea class="w-full border rounded px-3 py-2" id="item_desc_${idx}" name="item_desc"></textarea>
            </div>
            <div class="mb-2">
                <label class="block mb-1 font-semibold" for="item_link_${idx}">Ссылка (необязательно)</label>
                <input class="w-full border rounded px-3 py-2" type="url" id="item_link_${idx}" name="item_link">
            </div>
            <div class="mb-2">
                <label class="block mb-1 font-semibold" for="item_image_${idx}">Изображение (необязательно)</label>
                <input class="w-full border rounded px-3 py-2" type="file" id="item_image_${idx}" name="item_image">
            </div>
            <div>
                <label class="block mb-1 font-semibold" for="item_price_${idx}">Стоимость (необязательно)</label>
                <input class="w-full border rounded px-3 py-2" type="number" step="0.01" min="0" id="item_price_${idx}" name="item_price">
            </div>
        `;
        return div;
    }

    function renderNewItemForm() {
        itemsContainer.innerHTML = '';
        itemsContainer.appendChild(createItemForm(itemCount));
    }

    // Инициализация первой формы после создания вишлиста
    function showFirstItemForm() {
        itemCount = 1;
        renderNewItemForm();
    }

    if (addBtn) {
        addBtn.addEventListener('click', function () {
            if (!wishlistId) {
                alert("Сначала создайте вишлист");
                return;
            }
            // Получаем текущую форму
            const lastForm = itemsContainer.querySelector('.item-form');
            const name = lastForm.querySelector('[name="item_name"]').value;
            if (!name) {
                alert("Заполните название элемента");
                return;
            }
            const desc = lastForm.querySelector('[name="item_desc"]').value;
            const link = lastForm.querySelector('[name="item_link"]').value;
            const price = lastForm.querySelector('[name="item_price"]').value;
            const imageInput = lastForm.querySelector('[name="item_image"]');
            const formData = new FormData();
            formData.append('wishlist_id', wishlistId);
            formData.append('item_name', name);
            formData.append('item_desc', desc);
            formData.append('item_link', link);
            formData.append('item_price', price);
            if (imageInput && imageInput.files.length > 0) {
                formData.append('item_image', imageInput.files[0]);
            }

            fetch("{% url 'create_wish' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Добавить элемент в список
                        const li = document.createElement('li');
                        li.className = "bg-gray-100 rounded px-4 py-2 flex flex-col";
                        li.innerHTML = `<span class="font-semibold">${name}</span>
                            ${desc ? `<span class="text-gray-600">${desc}</span>` : ""}
                            ${link ? `<a href="${link}" class="text-blue-500 underline" target="_blank">Ссылка</a>` : ""}
                            ${price ? `<span class="text-gray-700">Стоимость: ${price}</span>` : ""}
                            ${imageInput && imageInput.files.length > 0 ? `<span class="text-gray-400 text-xs">Изображение загружено</span>` : ""}`;
                        itemsList.appendChild(li);

                        // Очищаем и добавляем новую форму
                        itemCount++;
                        renderNewItemForm();
                    } else {
                        alert(data.error || "Ошибка добавления элемента");
                    }
                })
                .catch(() => alert("Ошибка соединения с сервером"));
        });
    }

    // После рендера первой формы, кнопка всегда должна быть после формы
    function moveAddBtn() {
        if (addBtn.parentNode !== wishlistItemsBlock) {
            wishlistItemsBlock.appendChild(addBtn);
        }
    }

    // Следим за изменениями формы, чтобы кнопка всегда была после формы
    const observer = new MutationObserver(moveAddBtn);
    observer.observe(itemsContainer, {childList: true});

</script>
</body>
</html>
