{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Все вишлисты</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="wishlist-container">
        {% for wishlist in wishlists %}
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-6">
                <h2 class="text-xl font-semibold mb-2">
                    <a href="{% url 'wishlist_detail' wishlist.id %}" class="text-blue-600 hover:underline">{{ wishlist.title }}</a>
                </h2>
                <p class="text-gray-600 mb-4">{{ wishlist.description }}</p>
                <div class="flex items-center justify-between text-sm text-gray-500">
                    <span>Автор: {{ wishlist.user.username }}</span>
                    <span>{{ wishlist.created_at|date:"d.m.Y" }}</span>
                </div>
            </div>
        </div>
        {% empty %}
        <p class="text-gray-500">Вишлистов пока нет.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
