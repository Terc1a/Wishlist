<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Популярные Вишлисты</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-lg z-40 transform -translate-x-full transition-transform duration-300">
        <div class="flex items-center justify-between px-6 py-4 border-b">
            <span class="text-xl font-bold">Меню</span>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="mt-4 flex flex-col gap-2 px-6">
            <a href="#" class="py-2 px-3 rounded hover:bg-gray-100">Главная</a>
            <a href="#" class="py-2 px-3 rounded hover:bg-gray-100">Мои вишлисты</a>
            <a href="#" class="py-2 px-3 rounded hover:bg-gray-100">Профиль</a>
            <a href="#" class="py-2 px-3 rounded hover:bg-gray-100">Выйти</a>
        </nav>
    </div>
    <!-- Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-30 z-30 hidden" onclick="toggleSidebar()"></div>
    <!-- Header -->
    <header class="bg-white shadow-md py-4 px-6 flex items-center justify-between">
        <button onclick="toggleSidebar()" class="text-gray-700 focus:outline-none">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
        <h1 class="text-2xl font-bold text-gray-800">Популярные Вишлисты</h1>
        <div></div>
    </header>
    <!-- Main content -->
    <main class="max-w-3xl mx-auto mt-8 px-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">Список вишлистов</h2>
            <a href="{% url 'create_wishlist' %}" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Создать вишлист</a>
        </div>
        <div class="space-y-4">
            {% if wishlists %}
                {% for wl in wishlists %}
                    <div class="bg-white shadow rounded p-4 flex flex-col md:flex-row md:items-center justify-between">
                        <div>
                            <div class="text-lg font-semibold text-gray-800">{{ wl.name }}</div>
                            <div class="text-gray-500">{{wl.user}} | {{ wl.title }}</div>
                        </div>
                        <a href="wishlist/{{wl.id}}/" class="mt-2 md:mt-0 bg-gray-200 text-gray-700 px-3 py-1 rounded hover:bg-gray-300 transition">Открыть</a>
                    </div>
                {% endfor %}
            {% else %}
                <div class="text-gray-500 text-center py-8">Вишлистов пока нет. Создайте свой первый!</div>
            {% endif %}
        </div>
    </main>
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
