<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход и регистрация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white shadow rounded p-8">
        <div class="flex justify-center mb-6">
            <button id="show-login" class="px-4 py-2 rounded-l bg-blue-600 text-white font-semibold focus:outline-none">Вход</button>
            <button id="show-register" class="px-4 py-2 rounded-r bg-gray-200 text-gray-700 font-semibold focus:outline-none">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <form id="login-form" class="">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <h2 class="text-xl font-bold mb-4 text-center">Вход</h2>
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="login-username">Имя пользователя</label>
                <input class="w-full border rounded px-3 py-2" type="text" id="login-username" name="username" required>
            </div>
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="login-password">Пароль</label>
                <input class="w-full border rounded px-3 py-2" type="password" id="login-password" name="password" required>
            </div>
            <div id="login-error" class="text-red-500 mb-4 hidden"></div>
            <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Войти</button>
        </form>

        <!-- Форма регистрации -->
        <form id="register-form" class="hidden">
            {% csrf_token %}
            <h2 class="text-xl font-bold mb-4 text-center">Регистрация</h2>
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="reg-username">Имя пользователя</label>
                <input class="w-full border rounded px-3 py-2" type="text" id="reg-username" name="reg_username" required>
            </div>
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="reg-email">Email</label>
                <input class="w-full border rounded px-3 py-2" type="email" id="reg-email" name="reg_email" required>
            </div>
            <div class="mb-4">
                <label class="block mb-1 font-semibold" for="reg-password1">Пароль</label>
                <input class="w-full border rounded px-3 py-2" type="password" id="reg-password1" name="reg_password1" required>
            </div>
            <div class="mb-6">
                <label class="block mb-1 font-semibold" for="reg-password2">Повторите пароль</label>
                <input class="w-full border rounded px-3 py-2" type="password" id="reg-password2" name="reg_password2" required>
            </div>
            <div id="register-error" class="text-red-500 mb-4 hidden"></div>
            <button type="submit" class="w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">Зарегистрироваться</button>
        </form>
    </div>

    <script>
        const loginBtn = document.getElementById('show-login');
        const regBtn = document.getElementById('show-register');
        const loginForm = document.getElementById('login-form');
        const regForm = document.getElementById('register-form');
        const loginError = document.getElementById('login-error');
        const registerError = document.getElementById('register-error');

        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
        }

        function hideError(element) {
            element.textContent = '';
            element.classList.add('hidden');
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        loginBtn.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            regForm.classList.add('hidden');
            loginBtn.classList.add('bg-blue-600', 'text-white');
            loginBtn.classList.remove('bg-gray-200', 'text-gray-700');
            regBtn.classList.remove('bg-blue-600', 'text-white');
            regBtn.classList.add('bg-gray-200', 'text-gray-700');
            hideError(loginError);
        });

        regBtn.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            regForm.classList.remove('hidden');
            regBtn.classList.add('bg-blue-600', 'text-white');
            regBtn.classList.remove('bg-gray-200', 'text-gray-700');
            loginBtn.classList.remove('bg-blue-600', 'text-white');
            loginBtn.classList.add('bg-gray-200', 'text-gray-700');
            hideError(registerError);
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError(loginError);

            const formData = new FormData(loginForm);
            const csrftoken = getCookie('csrftoken');

            try {
                const response = await fetch('/login/', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': csrftoken
                    },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    showError(loginError, data.error);
                }
            } catch (error) {
                showError(loginError, 'Произошла ошибка при входе');
            }
        });

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError(registerError);

            const formData = new FormData(regForm);
            const csrftoken = getCookie('csrftoken');

            try {
                const response = await fetch('/register/', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': csrftoken
                    },
                    credentials: 'same-origin'
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    showError(registerError, data.error);
                }
            } catch (error) {
                showError(registerError, 'Произошла ошибка при регистрации');
            }
        });
    </script>
</body>
</html>
