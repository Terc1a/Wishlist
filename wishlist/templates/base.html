<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WishList{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-lg z-40 transform -translate-x-full transition-transform duration-300">
        <div class="flex items-center justify-between px-6 py-4 border-b">
            <span class="text-xl font-bold">Меню</span>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-gray-700">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="mt-4 flex flex-col gap-2 px-6">
            <a href="/" class="py-2 px-3 rounded hover:bg-gray-100">Главная</a>
            {% if user.is_authenticated %}
                <a href="/profile/" class="py-2 px-3 rounded hover:bg-gray-100">Мои вишлисты</a>
                <a href="/profile/" class="py-2 px-3 rounded hover:bg-gray-100">Профиль</a>
                <a href="/logout/" class="py-2 px-3 rounded hover:bg-gray-100">Выйти</a>
            {% else %}
                <a href="/login/" class="py-2 px-3 rounded hover:bg-gray-100">Войти</a>
                <a href="/register/" class="py-2 px-3 rounded hover:bg-gray-100">Регистрация</a>
            {% endif %}
        </nav>
    </div>
    <!-- Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-30 z-30 hidden" onclick="toggleSidebar()"></div>
    
    <!-- Header -->
    <header class="bg-white shadow-md py-4">
        <div class="container max-w-5xl mx-auto px-4">
            <div class="flex items-center gap-8">
                <button onclick="toggleSidebar()" class="text-gray-700 focus:outline-none shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                {% block header %}{% endblock %}
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="max-w-7xl mx-auto mt-8 px-4">
        {% block content %}{% endblock %}
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
